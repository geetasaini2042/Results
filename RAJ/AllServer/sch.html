<!DOCTYPE html>
<html>
<head>
    <title>School Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background-color: white; }
        #loading, #resultSection { text-align: center; margin-top: 40px; }
        .dot { animation: blink 1s infinite; font-size: 24px; color: blue; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .table-container { overflow-x: auto; width: 100%; margin-top: 20px; }
        table.enhancedTable {
            min-width: 1000px; border-collapse: collapse; font-size: 12px; margin: auto;
        }
        table.enhancedTable th, table.enhancedTable td {
            border: 1px solid #ccc; padding: 6px; text-align: center; white-space: nowrap;
        }
        table.enhancedTable th { background-color: #007bff; color: white; }
        table.enhancedTable tr:nth-child(even) { background-color: #f9f9f9; }
        table.enhancedTable tr:hover { background-color: #f1f1f1; }
        .green { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }

        @media print {
            body * { visibility: hidden; }
            #resultSection, #resultSection * { visibility: visible; }
            #resultSection { position: absolute; left: 0; right: 0; margin: auto; width: fit-content; }
            #backBtn { display: none !important; }
        }

        #backBtn {
            position: fixed; top: 10px; left: 10px; font-size: 24px; color: blue;
            background: none; border: none; cursor: pointer; display: none;
        }

        #pdfBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
        }
        #pdfBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div id="loading" style="display:none;">
    <p><span id="progressText">Processing...</span></p>
    <p><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
</div>

<div id="errorMsg" style="display:none; color: red; text-align: center; margin-top: 20px;"></div>

<div id="resultSection" style="display:none;">
    <button id="backBtn" onclick="goBack()">←</button>
    <h3 id="schoolName" style="color: #007bff; text-align: center;"></h3>
    <h4 id="streamSubjects" style="color: #555; text-align: center; margin-top: -10px;"></h4>
    <div id="result"></div>
    <button id="pdfBtn" onclick="sendAsPDF()">Get as PDF</button>
</div>

<!-- Hidden inputs populated via URL -->
<input type="hidden" id="year">
<input type="hidden" id="wb_id">
<input type="hidden" id="source">

<script>
async function fetchResult(roll, year, wb_id, source) {
    const url = `https://manish-bhaiyas-bot.onrender.com/result?roll_no=${roll}&year=${year}&wb_id=${wb_id}&source=${source}`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        return data.status !== "fail" ? data : null;
    } catch {
        return null;
    }
}

// विषयों की लिस्ट बनाने के लिए फंक्शन
function getSubjectString(subjectsData, wb_id) {
    let allSubjects = subjectsData
        .map(s => s.subject_name?.trim())
        .filter(name => name && name !== "" && name !== "-");

    if (wb_id === "88") {
        allSubjects = allSubjects.slice(0, 6);
    } else if (wb_id === "89") {
        allSubjects = allSubjects.slice(0, 5);
    }
    return allSubjects.join(", ");
}

async function checkSchoolResults(initialRoll, year, wb_id, source) {
    document.getElementById('loading').style.display = 'block';
    const progressText = document.getElementById('progressText');
    progressText.innerText = "स्कूल और विषय का डेटा खोजा जा रहा है...";

    const initialData = await fetchResult(initialRoll, year, wb_id, source);
    if (!initialData) {
        document.getElementById('loading').style.display = 'none';
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerText = `Roll No. ${initialRoll} का डेटा नहीं मिला।`;
        errorMsg.style.display = 'block';
        return;
    }

    const initialResult = initialData.data.board_result;
    const targetSchool = initialResult.candidate_info["School Name"];
    // शुरुआती छात्र के विषयों की लिस्ट बना ली गई है
    const targetSubjectsString = getSubjectString(initialResult.subjects, wb_id); 

    let allStudentsData = [initialData];
    let foundCount = 1;
    progressText.innerText = `समान विषय वाले छात्र खोजे जा रहे हैं... अब तक मिले: ${foundCount}`;

    // पीछे के रोल नंबर खोजना
    let currRoll = initialRoll - 1;
    let maxTries = 1000;
    while (maxTries > 0) {
        const data = await fetchResult(currRoll, year, wb_id, source);
        // यदि स्कूल बदल जाए या डेटा न मिले, तो रुक जाएं
        if (!data || data.data.board_result.candidate_info["School Name"] !== targetSchool) {
            break; 
        }
        
        // चेक करें कि क्या इस छात्र के विषय भी वही हैं
        const currSubjectsString = getSubjectString(data.data.board_result.subjects, wb_id);
        if (currSubjectsString === targetSubjectsString) {
            allStudentsData.push(data);
            foundCount++;
            progressText.innerText = `छात्र खोजे जा रहे हैं (पीछे)... अब तक मिले: ${foundCount}`;
        }
        currRoll--;
        maxTries--;
    }

    // आगे के रोल नंबर खोजना
    currRoll = initialRoll + 1;
    maxTries = 1000;
    while (maxTries > 0) {
        const data = await fetchResult(currRoll, year, wb_id, source);
        if (!data || data.data.board_result.candidate_info["School Name"] !== targetSchool) {
            break; 
        }

        const currSubjectsString = getSubjectString(data.data.board_result.subjects, wb_id);
        if (currSubjectsString === targetSubjectsString) {
            allStudentsData.push(data);
            foundCount++;
            progressText.innerText = `छात्र खोजे जा रहे हैं (आगे)... अब तक मिले: ${foundCount}`;
        }
        currRoll++;
        maxTries--;
    }

    progressText.innerText = "रिजल्ट तैयार किया जा रहा है...";
    processAndDisplayResults(allStudentsData, targetSchool, targetSubjectsString, wb_id);
}

function processAndDisplayResults(apiDataArray, targetSchool, targetSubjectsString, wb_id) {
    let subjects = null;
    const students = [];
    const subjectSums = {};
    const maxSubjectMarks = {};
    let totalMarksSum = 0;
    let studentCount = 0;

    apiDataArray.sort((a, b) => parseInt(a.data.board_result.candidate_info["Roll No."]) - parseInt(b.data.board_result.candidate_info["Roll No."]));

    for (const data of apiDataArray) {
        const result = data.data.board_result;
        const subjectsData = result.subjects;

        if (!subjects) {
            let allSubjects = subjectsData
                .map(s => s.subject_name?.trim())
                .filter(name => name && name !== "" && name !== "-");

            if (wb_id === "88") {
                allSubjects = allSubjects.slice(0, 6);
            } else if (wb_id === "89") {
                allSubjects = allSubjects.slice(0, 5);
            }

            subjects = allSubjects;
            subjects.forEach(s => {
                subjectSums[s] = 0;
                maxSubjectMarks[s] = 0;
            });
        }

        const student = {
            name: result.candidate_info["Candidate Name"],
            roll_no: parseInt(result.candidate_info["Roll No."]),
            school: result.candidate_info["School Name"] || "",
            marks: {},
            total: parseInt(result.result["Total Marks"] || "0"),
            percentage: result.result["percent"]?.trim() || "Failed"
        };

        subjects.forEach((subject, i) => {
            const sub = subjectsData[i] || {};
            let theory = sub.theory_seasional;
            let practical = sub.practical;
            let finalMark;

            if (!theory || theory === "" || theory === "A") {
                finalMark = "Absent";
            } else {
                theory = parseInt(theory);
                practical = parseInt(practical || "0");
                finalMark = theory + practical;

                subjectSums[subject] += finalMark;
                maxSubjectMarks[subject] = Math.max(maxSubjectMarks[subject], finalMark);
            }

            student.marks[subject] = finalMark;
        });

        totalMarksSum += student.total;
        students.push(student);
        studentCount++;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('backBtn').style.display = 'block';
    
    document.getElementById('schoolName').innerText = targetSchool;
    // स्क्रीन पर विषय (Subjects) भी दिखेंगे ताकि पता रहे कि यह कौनसी स्ट्रीम का रिजल्ट है
    document.getElementById('streamSubjects').innerText = `Subjects: ${targetSubjectsString}`;
    
    document.getElementById('result').innerHTML = generateTable(students, subjects, subjectSums, maxSubjectMarks, totalMarksSum, studentCount);
}

function goBack() {
    window.history.back();
}

function generateTable(students, subjects, subjectSums, maxSubjectMarks, totalMarksSum, studentCount) {
    let html = "<table class='enhancedTable'><tr><th>Rank</th><th>S.N.</th><th>Name</th><th>Roll No</th>";
    subjects.forEach(sub => html += `<th>${sub}</th>`);
    html += "<th>Total</th><th>Max</th><th>%</th></tr>";

    students.sort((a, b) => b.total - a.total);
    const rankMap = {};
    let rank = 1;
    students.forEach(stu => {
        const t = stu.total;
        if (!rankMap[t]) rankMap[t] = rank;
        rank++;
    });

    students.sort((a, b) => a.roll_no - b.roll_no);
    let sn = 1;
    students.forEach(stu => {
        html += `<tr><td>${rankMap[stu.total]}</td><td>${sn++}</td><td>${stu.name}</td><td>${stu.roll_no}</td>`;
        subjects.forEach(sub => {
            const m = stu.marks[sub];
            const highlight = (typeof m === "number" && m === maxSubjectMarks[sub]) ? "class='green'" : "";
            html += `<td ${highlight}>${m === "Absent" ? "<span class='fail'>Absent</span>" : m}</td>`;
        });
        html += `<td>${stu.total}</td><td>${subjects.length * 100}</td><td>${stu.percentage === "Failed" ? "<span class='fail'>Failed</span>" : stu.percentage + "%"}</td></tr>`;
    });

    html += `<tr style='font-weight:bold;'><td colspan='4'>Total Marks</td>`;
    subjects.forEach(sub => html += `<td>${subjectSums[sub]}</td>`);
    html += `<td>${totalMarksSum}</td><td>-</td><td>-</td></tr>`;

    html += `<tr style='font-weight:bold;'><td colspan='4'>Max Marks</td>`;
    subjects.forEach(() => html += `<td>${studentCount * 100}</td>`);
    html += `<td>${studentCount * subjects.length * 100}</td><td>-</td><td>-</td></tr>`;

    html += `<tr style='background-color:#d9edf7; font-weight:bold;'><td colspan='4'>Subject %</td>`;
    subjects.forEach(sub => {
        const percent = (subjectSums[sub] / (studentCount * 100)) * 100;
        html += `<td>${percent.toFixed(2)}%</td>`;
    });
    const overall = (totalMarksSum / (studentCount * subjects.length * 100)) * 100;
    html += `<td colspan='3'><strong>Overall: ${overall.toFixed(2)}%</strong></td></tr></table>`;

    return `<div class="table-container">${html}</div>`;
}

async function sendAsPDF() {
    const schoolName = document.getElementById('schoolName').innerText;
    const streamSubjects = document.getElementById('streamSubjects').innerText;
    const resultHTML = document.getElementById('result').innerHTML;

    const style = `
        <style>
            body { font-family: Arial, sans-serif; background-color: white; }
            h3 { color: #007bff; text-align: center; margin-bottom: 5px; }
            h4 { color: #555; text-align: center; margin-top: 0; }
            .table-container { overflow-x: auto; width: 100%; margin-top: 20px; }
            table.enhancedTable {
                min-width: 1000px; border-collapse: collapse; font-size: 12px; margin: auto;
            }
            table.enhancedTable th, table.enhancedTable td {
                border: 1px solid #ccc; padding: 6px; text-align: center; white-space: nowrap;
            }
            table.enhancedTable th { background-color: #007bff; color: white; }
            table.enhancedTable tr:nth-child(even) { background-color: #f9f9f9; }
            table.enhancedTable tr:hover { background-color: #f1f1f1; }
            .green { color: green; font-weight: bold; }
            .fail { color: red; font-weight: bold; }
        </style>`;

    const fullHTML = `<html><head><title>${schoolName} - Result</title>${style}</head><body><h3>${schoolName}</h3><h4>${streamSubjects}</h4>${resultHTML}</body></html>`;

    const params = new URLSearchParams(window.location.search);
    const chatId = params.get("user_id") || "6150091802";
    const botToken = "7831738668:AAH7Qc1zYoNd5DrY85kU4EN4GXY01JF91fk";

    const formData = new FormData();
    formData.append("html", fullHTML);
    formData.append("chat_id", chatId);
    formData.append("bot_token", botToken);

    try {
        const res = await fetch("https://sainipankaj12.serv00.net/Result/sch.php", {
            method: "POST",
            body: formData
        });
        const data = await res.json();
        if (data.status === "success") {
            alert("✅ PDF sent to Telegram successfully!");
        } else {
            alert("❌ Failed to send PDF.");
        }
    } catch (err) {
        alert("⚠️ Error sending PDF.");
    }
}

window.onload = async function () {
    const params = new URLSearchParams(window.location.search);
    const roll = parseInt(params.get('roll_no'));
    const year = params.get('year') || '2024';
    const wb_id = params.get('wb_id') || '88';
    const source = params.get('source') || 'app';
    const printFlag = params.has('print');

    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    if (isNaN(roll)) {
        errorMsg.innerText = "कृपया URL में सही roll_no पैरामीटर दें।";
        errorMsg.style.display = 'block';
        return;
    }

    document.getElementById('year').value = year;
    document.getElementById('wb_id').value = wb_id;
    document.getElementById('source').value = source;

    await checkSchoolResults(roll, year, wb_id, source);

    if (printFlag) {
        window.print();
    }
};
</script>
</body>
</html>
